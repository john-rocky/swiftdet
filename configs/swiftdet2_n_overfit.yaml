model:
  version: 2
  variant: n
  nc: 80
  width_mult: 0.30
  depth_mult: 0.33
  max_channels: 512
  neck_channels: 128
  reg_max: 16

train:
  epochs: 100
  batch_size: 16
  img_size: 640
  lr0: 0.004
  lrf: 0.01
  optimizer: adamw
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_bias_lr: 0.1
  close_mosaic: 10
  amp: true

augment:
  mosaic: 0.5
  mosaic9_prob: 0.0
  mixup: 0.0
  copy_paste: 0.0
  hsv_h: 0.01
  hsv_s: 0.3
  hsv_v: 0.2
  degrees: 0.0
  translate: 0.1
  scale: 0.3
  shear: 0.0
  flipud: 0.0
  fliplr: 0.5
  erasing: 0.0

loss:
  cls_gain: 0.5
  box_gain: 7.5
  dfl_gain: 1.5
